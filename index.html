<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AKARI | هویج پیر</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        :root { --orange: #FF6B35; --orange-glow: rgba(255,107,53,0.3); --glass-bg: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.08); }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }
        .page-1 { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; background: radial-gradient(ellipse at center, #1a0a00 0%, #0a0a0a 70%); z-index: 1; }
        .page-1.hidden { display: none; }
        .floating-icons { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
        .float-icon, .float-image { position: absolute; opacity: 0.15; animation: floatAnim 12s ease-in-out infinite alternate; filter: blur(0.5px); border-radius: 50%; object-fit: cover; }
        .float-icon { font-size: 2rem; display: flex; align-items: center; justify-content: center; width: 2.8rem; height: 2.8rem; }
        .float-image { border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 0 20px rgba(255,107,53,0.1); width: 2.8rem; height: 2.8rem; }
        @keyframes floatAnim { 0% { transform: translate(0, 0) rotate(0deg) scale(1); } 33% { transform: translate(25px, -35px) rotate(5deg) scale(1.08); } 66% { transform: translate(-20px, 25px) rotate(-4deg) scale(0.92); } 100% { transform: translate(15px, -20px) rotate(3deg) scale(1.05); } }
        .particles { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; width: 4px; height: 4px; background: var(--orange); border-radius: 50%; opacity: 0; animation: particleFloat 8s ease-in-out infinite; box-shadow: 0 0 10px var(--orange-glow); }
        .particle:nth-child(1) { left: 5%; animation-delay: 0s; } .particle:nth-child(2) { left: 15%; animation-delay: 1.5s; } .particle:nth-child(3) { left: 25%; animation-delay: 3s; } .particle:nth-child(4) { left: 35%; animation-delay: 4.5s; } .particle:nth-child(5) { left: 45%; animation-delay: 0.8s; } .particle:nth-child(6) { left: 55%; animation-delay: 2.3s; } .particle:nth-child(7) { left: 65%; animation-delay: 5.5s; } .particle:nth-child(8) { left: 75%; animation-delay: 3.8s; } .particle:nth-child(9) { left: 85%; animation-delay: 1.2s; } .particle:nth-child(10) { left: 95%; animation-delay: 4.2s; } .particle:nth-child(11) { left: 10%; animation-delay: 2s; } .particle:nth-child(12) { left: 40%; animation-delay: 5s; } .particle:nth-child(13) { left: 60%; animation-delay: 1s; } .particle:nth-child(14) { left: 80%; animation-delay: 3.5s; } .particle:nth-child(15) { left: 20%; animation-delay: 4s; }
        @keyframes particleFloat { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
        .landing-content { position: relative; z-index: 1; text-align: center; max-width: 700px; display: flex; flex-direction: column; align-items: center; min-height: 60vh; justify-content: center; }
        .landing-title { font-size: 4rem; font-weight: 900; background: linear-gradient(135deg, #FF6B35, #FF8C42, #FFB347); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; letter-spacing: -1px; line-height: 1.1; }
        .landing-sub { font-size: 1.8rem; font-weight: 300; color: #ccc; margin-bottom: 0.5rem; display: flex; flex-direction: row-reverse; justify-content: center; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .landing-sub .akari { color: var(--orange); font-weight: 600; }
        .landing-sub .havig { color: #999; font-weight: 300; }
        .landing-desc { font-size: 1rem; color: #999; max-width: 450px; margin: 1.5rem auto 2.5rem; line-height: 1.8; font-weight: 300; letter-spacing: 0.3px; }
        .landing-desc small { display: block; font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
        .btn-start { background: linear-gradient(135deg, var(--orange), #FF8C42); color: #fff; border: none; padding: 1rem 3.5rem; font-size: 1.2rem; font-weight: 700; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 40px var(--orange-glow); position: relative; overflow: hidden; font-family: 'Inter', sans-serif; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(255, 107, 53, 0.5); }
        .btn-start:active { transform: scale(0.95); }
        .btn-start::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%); animation: btnShine 3s ease-in-out infinite; }
        @keyframes btnShine { 0% { transform: translate(-100%, -100%) rotate(0deg); } 100% { transform: translate(100%, 100%) rotate(0deg); } }
        .footer-credit { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 2; font-family: 'Playfair Display', serif; font-size: 0.8rem; font-weight: 400; color: rgba(255,255,255,0.2); letter-spacing: 3px; text-transform: lowercase; transition: all 0.4s ease; }
        .footer-credit:hover { color: var(--orange); opacity: 0.8; letter-spacing: 5px; }
        .page-2 { height: 100vh; width: 100vw; background: #0a0a0a; display: none; position: relative; overflow: hidden; }
        .page-2.active { display: block; }
        .slide-container { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .slide { position: absolute; width: 90%; max-width: 500px; max-height: 85vh; opacity: 0; transform: scale(0.95) translateY(20px); transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); pointer-events: none; border-radius: 24px; overflow: hidden; box-shadow: 0 0 60px rgba(255, 107, 53, 0.1); border: 1px solid rgba(255, 255, 255, 0.05); background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .slide.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        .slide img { width: 100%; height: auto; max-height: 80vh; object-fit: contain; display: block; border-radius: 24px; }
        .slide-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 1rem; background: linear-gradient(transparent, rgba(0, 0, 0, 0.8)); color: #fff; font-size: 0.9rem; font-weight: 600; text-align: center; backdrop-filter: blur(4px); border-radius: 0 0 24px 24px; }
        .slide-label span { color: var(--orange); }
        .slide-counter { position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.8rem; color: #fff; border: 1px solid rgba(255, 255, 255, 0.05); z-index: 10; }
        .slide-counter span { color: var(--orange); }
        .slide-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--orange), #FF8C42); z-index: 10; transition: width 0.1s linear; width: 0%; border-radius: 0 2px 2px 0; }
        .slide-controls { position: absolute; bottom: 4rem; left: 50%; transform: translateX(-50%); display: flex; gap: 1rem; z-index: 10; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); padding: 0.5rem 1rem; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .slide-controls button { background: rgba(255, 255, 255, 0.05); border: none; color: #fff; padding: 0.4rem 0.8rem; border-radius: 30px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        .slide-controls button:hover { background: var(--orange); transform: scale(1.05); }
        .slide-controls button:active { transform: scale(0.95); }
        .slide-back-btn { position: absolute; top: 1.5rem; left: 1.5rem; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); color: #fff; padding: 0.5rem 1.2rem; border-radius: 50px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s ease; font-family: 'Inter', sans-serif; z-index: 10; }
        .slide-back-btn:hover { background: var(--orange); transform: scale(1.05); }
        .slide-back-btn:active { transform: scale(0.95); }
        .footer-credit-page2 { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 2; font-family: 'Playfair Display', serif; font-size: 0.8rem; font-weight: 400; color: rgba(255,255,255,0.2); letter-spacing: 3px; text-transform: lowercase; transition: all 0.4s ease; }
        .footer-credit-page2:hover { color: var(--orange); opacity: 0.8; letter-spacing: 5px; }
        @media (max-width: 480px) { .landing-title { font-size: 2.8rem; } .landing-sub { font-size: 1.2rem; flex-direction: row-reverse; gap: 0.3rem; } .landing-desc { font-size: 0.9rem; padding: 0 1rem; } .btn-start { padding: 0.8rem 2.5rem; font-size: 1rem; } .slide { width: 95%; max-width: 400px; } .slide-label { font-size: 0.7rem; padding: 0.6rem; } .slide-counter { top: 1rem; right: 1rem; font-size: 0.7rem; padding: 0.3rem 0.8rem; } .slide-controls { bottom: 3rem; padding: 0.3rem 0.8rem; gap: 0.5rem; } .slide-controls button { font-size: 0.7rem; padding: 0.3rem 0.6rem; } .slide-back-btn { top: 1rem; left: 1rem; font-size: 0.7rem; padding: 0.3rem 0.8rem; } .float-icon, .float-image { width: 2rem; height: 2rem; font-size: 1.5rem; } .footer-credit, .footer-credit-page2 { font-size: 0.6rem; bottom: 0.8rem; letter-spacing: 2px; } }
        @media (max-width: 380px) { .landing-title { font-size: 2.2rem; } .slide { max-width: 95%; } }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <!-- ===== PAGE 1 ===== -->
    <div class="page-1" id="page1">
        <div class="floating-icons" id="floatingIconsContainer"></div>
        <div class="particles">
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        </div>
        <div class="landing-content">
            <div class="landing-title">سالامممم</div>
            <div class="landing-sub">
                <span class="akari">AKARI</span>
                <span class="havig">(هویج پیر)</span>
            </div>
            <div class="landing-desc">This place was made for Akari.<small>If you're not Akari, you should probably leave.</small></div>
            <button class="btn-start" onclick="goToSlideshow()">شروع</button>
        </div>
        <div class="footer-credit">ProdbyKiya</div>
    </div>

    <!-- ===== PAGE 2: SLIDESHOW ===== -->
    <div class="page-2" id="page2">
        <div class="floating-icons" style="z-index:0; opacity:0.5;" id="floatingIconsContainer2"></div>
        <button class="slide-back-btn" onclick="goBack()">← بازگشت</button>
        <div class="slide-counter">بیلبیلک <span id="currentSlideNum">۱</span> از <span id="totalSlides">۱۷</span></div>
        <div class="slide-container" id="slideContainer"></div>
        <div class="slide-progress" id="slideProgress"></div>
        <div class="slide-controls">
            <button onclick="prevSlide()">‹ قبلی</button>
            <button onclick="togglePlay()" id="playBtn">⏸ توقف</button>
            <button onclick="nextSlide()">بعدی ›</button>
        </div>
        <div class="footer-credit-page2">ProdbyKiya</div>
    </div>

    <script>
        // ===== لیست ایموجی‌های گربه با رنگ‌های مختلف =====
        const catEmojis = ['🐱', '🐈', '🐈⬛', '😺', '😸', '😻', '🙀', '😽', '😼', '🐱'];
        // ===== لیست ۱۵ تا عکس =====
        const imageLinks = [
            'https://i.imgur.com/3iz3YlQ_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/tnHmDh5_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/a776aKh_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/ZCDpvNz_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/gTyHrKR_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/NPJTXKI_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/gvpKqUV_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/3m7nhyQ_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/2gv8nAZ_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/QWYwbyu_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/UUyR5n5_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/tZLOkaH_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/4rdPKkY_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/x2mufy3_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/Tq25Ufq_d.webp?maxwidth=760&fidelity=grand'
        ];

        // ===== تابع تبدیل لینک به فرمت اصلی =====
        function getDirectImageUrl(url) {
            let base = url.split('_d.webp')[0];
            return base + '.jpg';
        }

        // ===== ساخت المان‌های شناور =====
        function createFloatingElements(containerId) {
            const container = document.getElementById(containerId);
            const totalCats = 10;
            const totalImages = imageLinks.length;
            const elements = [];

            // ساخت ۱۰ تا گربه رنگی
            for (let i = 0; i < totalCats; i++) {
                const el = document.createElement('span');
                el.className = 'float-icon';
                el.textContent = catEmojis[i % catEmojis.length];
                // رنگ‌های مختلف برای هر گربه (با فیلتر)
                const hue = Math.random() * 360;
                el.style.filter = `hue-rotate(${hue}deg) saturate(2)`;
                el.style.opacity = 0.2 + Math.random() * 0.2;
                elements.push(el);
            }

            // ساخت ۱۵ تا عکس
            for (let i = 0; i < totalImages; i++) {
                const img = document.createElement('img');
                img.className = 'float-image';
                img.src = getDirectImageUrl(imageLinks[i]);
                img.alt = 'تصویر شناور';
                img.loading = 'lazy';
                elements.push(img);
            }

            // چینش تصادفی در صفحه
            elements.forEach(el => {
                const top = Math.random() * 100;
                const left = Math.random() * 100;
                const size = 1.5 + Math.random() * 2;
                const duration = 10 + Math.random() * 15;
                const delay = Math.random() * 10;

                el.style.top = top + '%';
                el.style.left = left + '%';
                if (el.tagName === 'SPAN') {
                    el.style.fontSize = size + 'rem';
                    el.style.width = size + 'rem';
                    el.style.height = size + 'rem';
                } else if (el.tagName === 'IMG') {
                    el.style.width = size + 'rem';
                    el.style.height = size + 'rem';
                }
                el.style.animationDuration = duration + 's';
                el.style.animationDelay = delay + 's';
                el.style.opacity = 0.1 + Math.random() * 0.2;

                container.appendChild(el);
            });
        }

        // ===== ساخت اسلایدها =====
        const slideImages = [
            'https://i.imgur.com/lSuQ1RO_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/eomSxlM_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/UbfPMeV_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/OGRzdrN_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/MZDaDIP_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/IEBjHRN_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/EMzjd2Q_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/guWTqd3_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/8tKRorr_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/8Ibr9av_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/aVw037o_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/61hhDpH_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/Bbqtq1X_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/MW8iDWb_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/zCUGMvS_d.webp?maxwidth=1520&fidelity=grand',
            'https://i.imgur.com/2cl3u3o_d.webp?maxwidth=760&fidelity=grand',
            'https://i.imgur.com/HCBQgbR_d.webp?maxwidth=1520&fidelity=grand'
        ];

        const container = document.getElementById('slideContainer');
        const totalSlides = slideImages.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        slideImages.forEach((src, index) => {
            const num = index + 1;
            const slide = document.createElement('div');
            slide.className = 'slide';
            if (index === 0) slide.classList.add('active');
            const directSrc = getDirectImageUrl(src);
            slide.innerHTML = `
                <img src="${directSrc}" alt="بیلبیلک شماره ${num}" loading="lazy" />
                <div class="slide-label">بیلبیلک شماره <span>${num}</span></div>
            `;
            container.appendChild(slide);
        });

        // ===== کنترل اسلایدها =====
        let currentIndex = 0;
        let isPlaying = true;
        let timer = null;
        const slideDuration = 5000;

        function updateSlide() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === currentIndex);
            });
            document.getElementById('currentSlideNum').textContent = currentIndex + 1;
            updateProgress();
        }

        function updateProgress() {
            document.getElementById('slideProgress').style.width = ((currentIndex + 1) / totalSlides * 100) + '%';
        }

        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                updateSlide();
                resetTimer();
            } else {
                currentIndex = 0;
                updateSlide();
                resetTimer();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlide();
                resetTimer();
            }
        }

        function goToSlideshow() {
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.add('active');
            startTimer();
        }

        function goBack() {
            document.getElementById('page1').classList.remove('hidden');
            document.getElementById('page2').classList.remove('active');
            stopTimer();
            currentIndex = 0;
            updateSlide();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').textContent = isPlaying ? '⏸ توقف' : '▶ پخش';
            if (isPlaying) startTimer();
            else stopTimer();
        }

        function startTimer() {
            stopTimer();
            timer = setInterval(nextSlide, slideDuration);
        }

        function stopTimer() {
            if (timer) { clearInterval(timer); timer = null; }
        }

        function resetTimer() {
            if (isPlaying) startTimer();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                if (e.key === ' ') { togglePlay(); return; }
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'Escape') {
                goBack();
            }
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        document.addEventListener('touchend', (e) => {
            if (document.getElementById('page2').classList.contains('active')) {
                const diff = touchStartX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) nextSlide();
                    else prevSlide();
                }
            }
        });

        // ===== اجرا =====
        createFloatingElements('floatingIconsContainer');
        createFloatingElements('floatingIconsContainer2');
        updateSlide();
    </script>

</body>
</html>
